spring.application.name=bootui-webflux-sample
# 8081, not 8080, so this can run alongside the servlet sample app (bootui-spring-sample-app, 8080) and
# the Quarkus sample app (bootui-quarkus-sample-app, 8082) at the same time without a port clash.
server.port=8081
spring.threads.virtual.enabled=true

# The "dev" profile (application-dev.properties) is the default so a bare `spring-boot:run`
# starts Docker-free on an in-memory H2 database.
spring.profiles.default=dev

# Keep BootUI active under both sample profiles (dev/local), so its activation reason is the
# profile rather than spring-boot-devtools.
bootui.enabled-profiles=dev,local

spring.flyway.enabled=true
# Liquibase and Flyway share one H2 schema here, so let Flyway baseline an already-populated
# schema (at version 0) instead of failing when Liquibase's tables land first.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.cache.cache-names=sample-greetings

logging.level.io.github.jdubois.bootui=DEBUG
