# Docker-free defaults for the sample app. "dev" is the DEFAULT profile
# (spring.profiles.default=dev in application.properties), so it applies to a bare `spring-boot:run`
# and the conformance/e2e suites.

# In-memory H2 database (the H2 driver is auto-detected from the jdbc:h2 URL, so an explicit
# driver-class-name is not needed).
spring.datasource.url=jdbc:h2:mem:bootui_webflux_sample;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=

# Simple in-memory cache.
spring.cache.type=simple
