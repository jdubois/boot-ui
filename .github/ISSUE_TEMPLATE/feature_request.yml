name: Feature request
description: Suggest an idea for BootUI
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem you are trying to solve
      description: What developer experience problem would this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like BootUI to behave?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to similar tools, examples.
