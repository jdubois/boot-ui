name: Publish Docker images

# Builds the five sample-app container images from the root Dockerfiles and
# publishes them to Docker Hub as multi-arch images (linux/amd64 + linux/arm64):
#
#   Dockerfile         -> <user>/bootui-sample-app          (JVM image)
#   Dockerfile-aot     -> <user>/bootui-sample-app-aot      (JVM + Spring AOT + JDK cache image)
#   Dockerfile-crac    -> <user>/bootui-sample-app-crac     (CRaC image)
#   Dockerfile-native  -> <user>/bootui-sample-app-native   (GraalVM native image)
#   Dockerfile-quarkus -> <user>/bootui-quarkus-sample-app  (Quarkus JVM dev-mode image, a separate sample app)
#
# Each Dockerfile copies the whole multi-module reactor and builds its sample app from
# that reactor, so the build context is the repository root. (The four Spring images
# build `bootui-sample-app`; the Quarkus image builds `bootui-quarkus-sample-app`.)
#
# The images are published once a day from the main branch (scheduled events run
# against the default branch) and can also be built on demand from the Actions tab.
#
# The workflow runs in strictly ordered phases, and tagging is all-or-nothing: no
# usable (tagged) image reaches Docker Hub unless every image on every platform builds
# and passes its smoke test. Each verified image is pushed by digest only (untagged, and
# therefore invisible until tagged); the rolling, dated and short-SHA tags are applied
# later, in a single merge phase that runs only if every build succeeded.
#
#   1. docker-config - validate the sample app's full Docker stack (the "docker"
#      Spring profile: PostgreSQL, Redis and Ollama from
#      bootui-sample-app/compose.yaml). Runs the full Maven test suite and then the
#      Playwright end-to-end suite against a sample app booted with the "docker"
#      profile, catching regressions in compose.yaml, the Redis-backed cache and the
#      Ollama / Spring AI wiring that the Docker-free build.yml does not exercise. The
#      job itself needs no Docker Hub secrets.
#
#   2. build - build, smoke-test and publish every image on every platform (a matrix
#      of 5 images x 2 platforms = 10 jobs). Each job builds its single-platform image
#      once and loads it into the runner's local Docker daemon (load: true) to
#      smoke-test it: the app must become ready (the Spring images poll GET
#      /actuator/health for status UP; the Quarkus image has no Actuator, so it polls
#      the BootUI panel manifest GET /bootui/api/panels), BootUI's back end must be
#      active (GET /bootui/api/panels) and the BootUI front end must be served
#      (GET /bootui/). The CRaC image additionally stops the
#      container and starts it again from the persisted checkpoint, verifying that the
#      restore serves BootUI and comes up at least twice as fast as the initial
#      boot-and-checkpoint start. Only once the smoke test passes does the job push that
#      exact image to Docker Hub by digest (no tags): the push reuses the layers just
#      built in this job's local Buildx cache (backed by a per-image, per-platform GitHub
#      Actions layer cache), so it is a cache hit that only assembles and pushes - the
#      tested image is published, never a rebuild of it, and the expensive native-image
#      compilation is never repeated. A failed build or smoke test on any image/platform
#      fails its job, so the merge phase below never runs and no tag is ever applied.
#
#   3. merge - assemble the tagged multi-arch manifest list for each image (a matrix
#      of 5 images) from the per-platform digests pushed in phase 2, applying the
#      rolling `latest`, dated and short-SHA tags. Runs only if every build job
#      succeeded.
#
#   4. prune - delete dated/SHA tags older than one week from each repository (the
#      rolling `latest` tag is always kept) so old daily images do not accumulate,
#      since Docker Hub has no built-in retention policy. Deleting a tag only removes the
#      tag pointer, so this phase then also sweeps the now-orphaned, untagged per-platform
#      child manifests that every build pushes by digest (the merge phase stitches those
#      digests into the tagged manifest list, but Docker Hub never garbage-collects them and
#      the tags API does not even list them). Runs only after a successful merge, so old
#      images are pruned only once fresh ones have actually replaced them.
#
# Multi-arch is produced by building each image once per platform on a *native* runner
# (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm) rather than under QEMU emulation:
# GraalVM cannot cross-compile a native image, emulated native-image / Maven builds
# would not fit the time budget, and `load: true` (used by the smoke test) only works
# with a single-platform image. Running on native runners also means each architecture
# is smoke-tested on its own hardware. Each image is built exactly once per platform, in
# the same job that smoke-tests and then pushes it, so the native image is never compiled
# a second time.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  Docker Hub account/namespace the images are pushed to.
#   DOCKERHUB_TOKEN     Docker Hub access token (Account Settings > Personal access
#                       tokens). It must have "Read, Write, Delete" scope: Write to
#                       push images and Delete to prune old tags. Do not use the
#                       account password.

on:
  schedule:
    # Every day at 07:17 UTC. Deliberately off the top of the hour: GitHub delays
    # and, under sufficiently high load, drops scheduled events during the peak
    # window at the start of each hour, so a ':00' cron is unreliable.
    - cron: '17 7 * * *'
  workflow_dispatch:
    inputs:
      prune_dry_run:
        description: 'Preview untagged-manifest pruning without deleting (dry run)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-config:
    name: Validate the Docker-based configuration
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: npm
          cache-dependency-path: |
            bootui-ui/src/main/frontend/package-lock.json
            bootui-sample-app/e2e/package-lock.json

      - name: Build all modules and run the full test suite
        run: ./mvnw -B -ntp clean install

      - name: Install Playwright dependencies
        working-directory: bootui-sample-app/e2e
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        working-directory: bootui-sample-app/e2e
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Pre-pull the Docker Compose images
        run: docker compose -f bootui-sample-app/compose.yaml pull

      - name: Run the end-to-end suite against the Docker profile
        working-directory: bootui-sample-app/e2e
        env:
          # Boot the sample app with the full Docker stack instead of the Docker-free default.
          BOOTUI_SAMPLE_PROFILES: docker
          # Allow extra time for Docker Compose to start and for Ollama to pull the chat model.
          BOOTUI_WEBSERVER_TIMEOUT: '600000'
        run: npm test

      - name: Print Docker Compose logs on failure
        if: failure()
        run: docker compose -f bootui-sample-app/compose.yaml logs --no-color

      - name: Tear down any leftover Docker Compose services
        if: always()
        run: docker compose -f bootui-sample-app/compose.yaml down --volumes --remove-orphans

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-docker
          path: |
            bootui-sample-app/e2e/playwright-report/
            bootui-sample-app/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build, smoke-test and publish ${{ matrix.image }} (${{ matrix.platform }})
    # Build each platform on a native runner: arm64 on GitHub's hosted arm64
    # runners, everything else (amd64) on the standard x86_64 runners.
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    # Wait for the Docker-profile validation before building anything: a regression
    # there blocks every image.
    needs: docker-config
    # DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are stored as environment secrets, so the
    # job must opt in to that environment to read them: the login raises the anonymous
    # base-image pull-rate limit, and the verified image is pushed by digest from here.
    environment: docker-hub
    # The native build dominates the runtime; allow generous headroom.
    timeout-minutes: 90
    # Only build from the canonical repository: forks lack the Docker Hub secrets.
    if: github.repository == 'jdubois/boot-ui'
    strategy:
      # Build and smoke-test every image/platform even if one fails, so a single run
      # surfaces every broken variant. Tagging is gated on all of them passing (see the
      # merge job), so fail-fast: false never causes a partial tagged publish.
      fail-fast: false
      matrix:
        image:
          - bootui-sample-app
          - bootui-sample-app-aot
          - bootui-sample-app-crac
          - bootui-sample-app-native
          - bootui-quarkus-sample-app
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - image: bootui-sample-app
            dockerfile: Dockerfile
            # Plain JVM image: no special privileges; ready within a few seconds.
            run_args: ''
            health_timeout: '120'
            ready_url: /actuator/health
            ready_match: '"status":"UP"'
          - image: bootui-sample-app-aot
            dockerfile: Dockerfile-aot
            # JVM + Spring AOT + JDK 25 AOT cache: no special privileges; starts
            # faster than the plain JVM image (~40–45 % shorter startup). The JDK
            # AOT cache training run happens at build time, so the container start
            # is a normal unprivileged launch.
            run_args: ''
            health_timeout: '120'
            ready_url: /actuator/health
            ready_match: '"status":"UP"'
          - image: bootui-sample-app-crac
            dockerfile: Dockerfile-crac
            # CRaC needs CRIU privileges and a checkpoint volume (see docker-compose-crac.yml).
            # The first start takes the checkpoint and then restores, so allow extra time.
            run_args: '--cap-add=CHECKPOINT_RESTORE --cap-add=SYS_PTRACE --cap-add=SYS_ADMIN -v bootui-smoke-crac-checkpoint:/opt/crac/checkpoint'
            health_timeout: '240'
            ready_url: /actuator/health
            ready_match: '"status":"UP"'
          - image: bootui-sample-app-native
            dockerfile: Dockerfile-native
            # GraalVM native image: no special privileges; starts in well under a second.
            run_args: ''
            health_timeout: '120'
            ready_url: /actuator/health
            ready_match: '"status":"UP"'
          - image: bootui-quarkus-sample-app
            dockerfile: Dockerfile-quarkus
            # Quarkus JVM image launched in dev mode (BootUI activates only outside the
            # production launch mode); no special privileges, but dev-mode re-augmentation
            # at startup makes it slower to become ready than the Spring JVM image. It has
            # no Actuator, so readiness is the BootUI panel manifest, not /actuator/health.
            run_args: ''
            health_timeout: '180'
            ready_url: /bootui/api/panels
            ready_match: '"platform"'
    steps:
      - name: Resolve image name and platform tag
        run: |
          platform='${{ matrix.platform }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          echo "REGISTRY_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Build the image and load it for the smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          # Build and load into the runner's local Docker daemon so the image can be
          # smoke-tested without publishing anything. load: true needs a single-platform
          # image, which is exactly what one matrix platform produces. The local smoke
          # tag is never pushed - the publish step below pushes the verified image by
          # digest, reusing these very layers.
          push: false
          load: true
          tags: ${{ env.REGISTRY_IMAGE }}:smoke-${{ env.PLATFORM_PAIR }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image, per-platform GitHub Actions layer cache. mode=max exports every
          # layer so the publish step below can assemble and push this image from cache
          # without repeating the (expensive, native) build.
          cache-from: type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ env.PLATFORM_PAIR }}

      - name: Smoke-test the loaded image
        env:
          IMAGE_REF: ${{ env.REGISTRY_IMAGE }}:smoke-${{ env.PLATFORM_PAIR }}
          RUN_ARGS: ${{ matrix.run_args }}
          HEALTH_TIMEOUT: ${{ matrix.health_timeout }}
          READY_URL: ${{ matrix.ready_url }}
          READY_MATCH: ${{ matrix.ready_match }}
        run: |
          set -euo pipefail

          # Start the freshly built image. The port is published on loopback only, and
          # BOOTUI_TRUST_CONTAINER_GATEWAY=AUTO lets BootUI trust the Docker bridge
          # gateway so probes from the runner over the published port are not rejected
          # by LocalhostOnlyFilter (which otherwise fails closed for non-loopback callers).
          started_at=$(date +%s)
          docker run -d --name bootui-smoke \
            -p 127.0.0.1:8080:8080 \
            -e BOOTUI_TRUST_CONTAINER_GATEWAY=AUTO \
            $RUN_ARGS \
            "$IMAGE_REF"

          base_url='http://127.0.0.1:8080'

          # 1. App is up: poll the readiness URL until it responds as expected. The URL
          # and the expected substring are matrix-driven (ready_url / ready_match): the
          # Spring images poll /actuator/health for "status":"UP", while the Quarkus image
          # has no Actuator and instead polls the BootUI panel manifest (/bootui/api/panels).
          # Poll once a second so the elapsed time is measured with usable resolution
          # (the CRaC restart check below compares start durations).
          echo "Waiting up to ${HEALTH_TIMEOUT}s for ${READY_URL} to become ready..."
          deadline=$(( $(date +%s) + $HEALTH_TIMEOUT ))
          until body=$(curl -fsS "${base_url}${READY_URL}" 2>/dev/null) && \
                echo "$body" | grep -q "$READY_MATCH"; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "ERROR: ${READY_URL} did not become ready within ${HEALTH_TIMEOUT}s." >&2
              exit 1
            fi
            # Fail fast if the container has already exited.
            if [ "$(docker inspect -f '{{.State.Running}}' bootui-smoke 2>/dev/null)" != 'true' ]; then
              echo "ERROR: container exited before becoming healthy." >&2
              exit 1
            fi
            sleep 1
          done
          first_start_seconds=$(( $(date +%s) - started_at ))
          echo "OK: app is ready (${READY_URL}) in ${first_start_seconds}s."
          # Export for the CRaC restart-speed check (a no-op for the other variants).
          echo "FIRST_START_SECONDS=${first_start_seconds}" >> "$GITHUB_ENV"

          # 2. BootUI back end is active: /bootui/api/panels must return HTTP 200. If
          # BootUI were silently disabled (its fail-closed default) this would 404.
          echo "Checking the BootUI API (/bootui/api/panels)..."
          curl -fsS -o /dev/null "${base_url}/bootui/api/panels"
          echo "OK: BootUI back end is active (/bootui/api/panels -> 200)."

          # 3. BootUI front end is served: /bootui/ must return the Vue SPA shell (HTTP 200).
          echo "Checking the BootUI front end (/bootui/)..."
          curl -fsS -o /dev/null "${base_url}/bootui/"
          echo "OK: BootUI front end is served (/bootui/ -> 200)."

          echo "Smoke test passed for ${IMAGE_REF}."

      - name: Verify the CRaC image restarts at least 2x faster from its checkpoint
        # CRaC only: the first start above booted the app, wrote the checkpoint, then
        # restored it (and persisted the checkpoint in the named volume). Stop that
        # container and start a fresh one from the same image and volume: with a
        # checkpoint present, the entrypoint takes the restore-only path, which must
        # come up - and do so at least twice as fast as the initial
        # boot-and-checkpoint start.
        if: matrix.image == 'bootui-sample-app-crac'
        env:
          IMAGE_REF: ${{ env.REGISTRY_IMAGE }}:smoke-${{ env.PLATFORM_PAIR }}
          RUN_ARGS: ${{ matrix.run_args }}
          HEALTH_TIMEOUT: ${{ matrix.health_timeout }}
        run: |
          set -euo pipefail

          # Stop and remove the first container but keep the checkpoint volume.
          echo "Stopping the first CRaC container (keeping the checkpoint volume)..."
          docker rm -f bootui-smoke

          base_url='http://127.0.0.1:8080'

          # Start again from the same image and checkpoint volume (restore-only path).
          started_at=$(date +%s)
          docker run -d --name bootui-smoke-restore \
            -p 127.0.0.1:8080:8080 \
            -e BOOTUI_TRUST_CONTAINER_GATEWAY=AUTO \
            $RUN_ARGS \
            "$IMAGE_REF"

          echo "Waiting up to ${HEALTH_TIMEOUT}s for the restored app to report health UP..."
          deadline=$(( $(date +%s) + $HEALTH_TIMEOUT ))
          until status=$(curl -fsS "${base_url}/actuator/health" 2>/dev/null) && \
                echo "$status" | grep -q '"status":"UP"'; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "ERROR: restored app did not report health UP within ${HEALTH_TIMEOUT}s." >&2
              exit 1
            fi
            if [ "$(docker inspect -f '{{.State.Running}}' bootui-smoke-restore 2>/dev/null)" != 'true' ]; then
              echo "ERROR: restored container exited before becoming healthy." >&2
              exit 1
            fi
            sleep 1
          done
          second_start_seconds=$(( $(date +%s) - started_at ))
          echo "OK: app restored and reported health UP in ${second_start_seconds}s (first start: ${FIRST_START_SECONDS}s)."

          # The restored app must still serve BootUI (back end + front end).
          curl -fsS -o /dev/null "${base_url}/bootui/api/panels"
          curl -fsS -o /dev/null "${base_url}/bootui/"
          echo "OK: BootUI back end and front end are served after the restore."

          # The restore must be at least twice as fast as the initial
          # boot-and-checkpoint start (i.e. take at most half as long). Compare with
          # multiplication to avoid integer-division rounding.
          if [ "$(( second_start_seconds * 2 ))" -gt "$FIRST_START_SECONDS" ]; then
            echo "ERROR: the restored start (${second_start_seconds}s) was not at least 2x faster than the first start (${FIRST_START_SECONDS}s)." >&2
            exit 1
          fi
          echo "OK: CRaC restore (${second_start_seconds}s) is at least 2x faster than the initial start (${FIRST_START_SECONDS}s)."

      - name: Push the smoke-tested image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # The smoke test above has passed (this step's default if: success() means it
          # is skipped otherwise), so publish exactly what was tested. Every layer is
          # already in this job's local Buildx cache - and in the GitHub Actions cache
          # written by the build-and-load step above (same image/platform scope) - so
          # this is a cache hit that only assembles and pushes: the (expensive, native)
          # build is never repeated. Push the per-platform image by digest only (no
          # tags); the merge job builds the tagged manifest list from these digests.
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          # Do not attach SLSA provenance / SBOM attestations. They would be pushed as
          # extra "unknown/unknown" manifests alongside each platform image, and once
          # the merge job flattens the per-platform digests into one manifest list those
          # attestation manifests clutter it (Docker Hub then renders the tag as having
          # phantom extra platforms instead of a clean linux/amd64 + linux/arm64 pair).
          provenance: false
          sbom: false

      - name: Save the pushed image's digest to a file
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload the digest as an artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Print container logs on failure
        if: failure()
        run: |
          docker logs bootui-smoke || true
          docker logs bootui-smoke-restore || true

      - name: Tear down the smoke-test container
        if: always()
        run: |
          docker rm -f bootui-smoke || true
          docker rm -f bootui-smoke-restore || true
          docker volume rm -f bootui-smoke-crac-checkpoint || true

  merge:
    name: Merge ${{ matrix.image }} manifests
    runs-on: ubuntu-latest
    # Tag and publish only once every per-platform image has been pushed by digest, so
    # the rolling tags are applied atomically across all images (all-or-nothing).
    needs: build
    if: github.repository == 'jdubois/boot-ui'
    environment: docker-hub
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        image:
          - bootui-sample-app
          - bootui-sample-app-aot
          - bootui-sample-app-crac
          - bootui-sample-app-native
          - bootui-quarkus-sample-app
    steps:
      - name: Resolve image name
        run: echo "REGISTRY_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}" >> "$GITHUB_ENV"

      - name: Download the per-platform digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          # Anchor on the '-linux-' platform segment so the base image does not also
          # match the longer image names: 'bootui-sample-app' is a prefix of
          # 'bootui-sample-app-crac' / 'bootui-sample-app-native', so a plain
          # 'digests-bootui-sample-app-*' would pull in those variants' digests and
          # then fail with "not found" (they live in different repositories).
          pattern: digests-${{ matrix.image }}-linux-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract image metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=sha,format=short

      - name: Create and push the tagged manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect the published manifest list
        run: docker buildx imagetools inspect "${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}"

  prune:
    name: Prune Docker Hub tags (and untagged manifests when enabled)
    runs-on: ubuntu-latest
    # Prune only after a successful merge, so old daily images are removed only once
    # fresh ones have replaced them - never pruning a repository down to a stale
    # `latest` because today's build failed.
    needs: merge
    if: github.repository == 'jdubois/boot-ui'
    environment: docker-hub
    timeout-minutes: 10
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      # Tags whose last push is older than this many days are deleted.
      MAX_AGE_DAYS: '7'
    steps:
      - name: Delete tags older than ${{ env.MAX_AGE_DAYS }} days
        run: |
          set -euo pipefail

          # Exchange the access token for a short-lived Docker Hub API JWT.
          token=$(curl -fsS -H 'Content-Type: application/json' \
            -d "{\"username\": \"${DOCKERHUB_USERNAME}\", \"password\": \"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = 'null' ]; then
            echo 'Failed to authenticate to the Docker Hub API.' >&2
            exit 1
          fi

          cutoff=$(date -u -d "${MAX_AGE_DAYS} days ago" +%s)

          for repo in bootui-sample-app bootui-sample-app-aot bootui-sample-app-crac bootui-sample-app-native bootui-quarkus-sample-app; do
            echo "::group::Pruning ${DOCKERHUB_USERNAME}/${repo}"
            url="https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${repo}/tags/?page_size=100"
            while [ -n "$url" ] && [ "$url" != 'null' ]; do
              resp=$(curl -fsS -H "Authorization: JWT ${token}" "$url")
              while read -r name updated; do
                # Always keep the rolling 'latest' tag.
                [ "$name" = 'latest' ] && { echo "Keeping  ${repo}:${name} (latest)"; continue; }
                updated_epoch=$(date -u -d "$updated" +%s)
                if [ "$updated_epoch" -lt "$cutoff" ]; then
                  echo "Deleting ${repo}:${name} (last updated ${updated})"
                  curl -fsS -X DELETE -H "Authorization: JWT ${token}" \
                    "https://hub.docker.com/v2/repositories/${DOCKERHUB_USERNAME}/${repo}/tags/${name}/"
                else
                  echo "Keeping  ${repo}:${name} (last updated ${updated})"
                fi
              done < <(echo "$resp" | jq -r '.results[] | "\(.name) \(.last_updated)"')
              url=$(echo "$resp" | jq -r '.next')
            done
            echo "::endgroup::"
          done

      - name: Delete untagged manifests older than ${{ env.MAX_AGE_DAYS }} days
        # The build phase pushes each per-platform image by digest (untagged); the merge
        # phase stitches those digests into the tagged multi-arch manifest list. Deleting a
        # tag above only removes the tag pointer - Docker Hub never garbage-collects the
        # untagged per-platform child manifests, and the tags API does not even list them,
        # so they accumulate. This step sweeps them via the images API (currently_tagged=false
        # returns only untagged manifests) and the bulk delete-images endpoint. active_from is
        # the same cutoff and is passed to delete-images as a server-side safety net, so nothing
        # pushed or pulled within the window can be removed even by mistake.
        #
        # IMPORTANT - this is OPT-IN and disabled by default. The images / delete-images API it
        # uses is only available to Docker Pro and Team plans (it returns 403/404 on Free) and
        # uses Bearer auth, not the JWT scheme the older /v2/repositories tags API accepts. On
        # the Free plan there is no safe automated way to reclaim untagged-manifest storage:
        # deleting a tag does not free the underlying manifest, and the only Free operation that
        # does - deleting the whole repository - would also reset these public images' stars and
        # pull counts and make them unavailable during each rebuild. So the step runs only when
        # the repository variable DOCKERHUB_UNTAGGED_PRUNE is set to 'true' (do that after
        # upgrading to a Pro/Team plan). If it is enabled on a plan that lacks the API it still
        # degrades gracefully - it warns and skips rather than failing the publish pipeline.
        if: vars.DOCKERHUB_UNTAGGED_PRUNE == 'true'
        env:
          DRY_RUN: ${{ github.event.inputs.prune_dry_run || 'false' }}
        run: |
          set -euo pipefail

          # Exchange the access token for a short-lived Docker Hub API JWT.
          token=$(curl -fsS -H 'Content-Type: application/json' \
            -d "{\"username\": \"${DOCKERHUB_USERNAME}\", \"password\": \"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login | jq -r '.token')
          if [ -z "$token" ] || [ "$token" = 'null' ]; then
            echo 'Failed to authenticate to the Docker Hub API.' >&2
            exit 1
          fi

          # Untagged manifests last active (pushed or pulled) before this moment are pruned.
          active_from=$(date -u -d "${MAX_AGE_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)

          for repo in bootui-sample-app bootui-sample-app-aot bootui-sample-app-crac bootui-sample-app-native bootui-quarkus-sample-app; do
            echo "::group::Sweeping untagged manifests in ${DOCKERHUB_USERNAME}/${repo}"

            # Collect the digests of untagged, inactive manifests older than the cutoff.
            # The status / currently_tagged filters are applied again client-side so the
            # sweep stays correct even if a paginated 'next' URL drops a query parameter.
            digests=()
            url="https://hub.docker.com/v2/namespaces/${DOCKERHUB_USERNAME}/repositories/${repo}/images?status=inactive&currently_tagged=false&active_from=${active_from}&ordering=last_activity&page_size=100"
            while [ -n "$url" ] && [ "$url" != 'null' ]; do
              # Capture the HTTP status (no -f) so a plan-gated 403/404 can be skipped gracefully.
              body=$(mktemp)
              status=$(curl -sS -o "$body" -w '%{http_code}' -H "Authorization: Bearer ${token}" "$url")
              resp=$(cat "$body")
              rm -f "$body"
              if [ "$status" = '403' ] || [ "$status" = '404' ]; then
                echo "::warning::Docker Hub returned HTTP ${status} for the image-management API. Untagged-manifest pruning requires a Docker Pro or Team plan; skipping. Untagged per-platform manifests must be removed manually from the Docker Hub UI."
                echo "::endgroup::"
                # Plan entitlement is account-wide, so the remaining repositories would fail too.
                exit 0
              fi
              if [ "$status" != '200' ]; then
                echo "Unexpected HTTP ${status} from the Docker Hub images API:" >&2
                echo "$resp" >&2
                exit 1
              fi
              while read -r digest; do
                [ -n "$digest" ] && digests+=("$digest")
              done < <(echo "$resp" | jq -r '
                .results[]
                | select(.status == "inactive")
                | select([.tags[]? | select(.is_current)] | length == 0)
                | .digest')
              url=$(echo "$resp" | jq -r '.next')
            done

            if [ "${#digests[@]}" -eq 0 ]; then
              echo "No untagged manifests older than ${MAX_AGE_DAYS} days."
              echo "::endgroup::"
              continue
            fi

            echo "Found ${#digests[@]} untagged manifest(s) to delete (dry_run=${DRY_RUN})."

            # Docker Hub caps each delete-images request at 25 manifests, so batch them.
            for ((i = 0; i < ${#digests[@]}; i += 25)); do
              batch=("${digests[@]:i:25}")
              manifests=$(printf '%s\n' "${batch[@]}" \
                | jq -R --arg repo "$repo" 'select(length > 0) | {repository: $repo, digest: .}' \
                | jq -s '.')
              payload=$(jq -n \
                --argjson dry_run "$DRY_RUN" \
                --arg active_from "$active_from" \
                --argjson manifests "$manifests" \
                '{dry_run: $dry_run, active_from: $active_from, manifests: $manifests}')
              echo "Deleting batch of ${#batch[@]} manifest(s)..."
              curl -fsS -X POST -H "Authorization: Bearer ${token}" -H 'Content-Type: application/json' \
                -d "$payload" \
                "https://hub.docker.com/v2/namespaces/${DOCKERHUB_USERNAME}/delete-images" \
                | jq '.'
            done
            echo "::endgroup::"
          done
