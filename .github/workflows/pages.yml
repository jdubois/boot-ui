name: Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Sync starter version in setup docs
        run: |
          set -euo pipefail
          VERSION="$(perl -0ne 'print $1 and exit if m{<artifactId>bootui-parent</artifactId>\s*<version>([^<]+)</version>}' pom.xml)"
          if [[ -z "${VERSION:-}" ]]; then
            echo "::error::Could not determine the project version from pom.xml"
            exit 1
          fi
          echo "Syncing bootui-spring-boot-starter version to $VERSION"
          export VERSION
          perl -0pi -e 's{(<artifactId>bootui-spring-boot-starter</artifactId>\s*<version>)[^<]*(</version>)}{$1$ENV{VERSION}$2}g' README.md docs/SETUP.md
          if ! grep -q "<version>$VERSION</version>" docs/SETUP.md; then
            echo "::error::Failed to update the bootui-spring-boot-starter version in docs/SETUP.md to $VERSION"
            exit 1
          fi

      - name: Build VuePress site
        run: npm run docs:build
        env:
          VUEPRESS_BASE: /boot-ui/

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vuepress/dist

  deploy:
    name: Deploy documentation site
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
