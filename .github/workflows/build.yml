name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.0'
          cache: npm
          cache-dependency-path: |
            bootui-ui/src/main/frontend/package-lock.json
            bootui-sample-app/e2e/package-lock.json

      - name: Check Maven formatting
        run: ./mvnw -B -ntp spotless:check

      - name: Build all modules
        run: ./mvnw -B -ntp clean install

      - name: Check frontend formatting
        working-directory: bootui-ui/src/main/frontend
        run: npm run format:check

      - name: Install Playwright dependencies
        working-directory: bootui-sample-app/e2e
        run: npm ci

      - name: Check Playwright formatting
        working-directory: bootui-sample-app/e2e
        run: npm run format:check

      - name: Install Playwright browsers
        working-directory: bootui-sample-app/e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright end-to-end tests
        working-directory: bootui-sample-app/e2e
        run: npm test

      - name: Publish Java test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Java tests (Surefire)
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Publish frontend unit test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Frontend unit tests (Vitest)
          path: bootui-ui/src/main/frontend/test-results/vitest-junit.xml
          reporter: jest-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Publish end-to-end test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: End-to-end tests (Playwright)
          path: bootui-sample-app/e2e/test-results/junit/results.xml
          reporter: jest-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            bootui-sample-app/e2e/playwright-report/
            bootui-sample-app/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload JUnit test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: junit-test-reports
          path: |
            **/target/surefire-reports/TEST-*.xml
            bootui-ui/src/main/frontend/test-results/vitest-junit.xml
            bootui-sample-app/e2e/test-results/junit/results.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload sample-app jar
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: bootui-sample-app
          path: bootui-sample-app/target/*.jar
          if-no-files-found: warn
          retention-days: 7
