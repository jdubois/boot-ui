name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['25']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: bootui-sample-app/e2e/package-lock.json

      - name: Build all modules
        run: mvn -B -ntp clean install

      - name: Install Playwright dependencies
        working-directory: bootui-sample-app/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright end-to-end tests
        working-directory: bootui-sample-app/e2e
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            bootui-sample-app/e2e/playwright-report/
            bootui-sample-app/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload sample-app jar
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: bootui-sample-app
          path: bootui-sample-app/target/*.jar
          if-no-files-found: warn
          retention-days: 7
