name: Native image

# Builds the GraalVM native image of the sample app and smoke-tests it.
#
# The native build is slow, so it does not run on every push. Instead it runs
# once a week to catch regressions in the native configuration (runtime hints,
# reachability metadata, GraalVM/Spring Boot upgrades) and can also be started
# manually from the Actions tab.

on:
  schedule:
    # Every Monday at 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native:
    name: Build and smoke-test native image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build native image and start the stack
        run: docker compose -f docker-compose-native.yml up --build --detach

      - name: Wait for the application to become healthy
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "Application is UP."
              exit 0
            fi
            echo "Waiting for the application to start (attempt ${attempt}/60)..."
            sleep 5
          done
          echo "Application did not become healthy in time."
          exit 1

      - name: Print application logs on failure
        if: failure()
        run: docker compose -f docker-compose-native.yml logs app

      - name: Tear down the stack
        if: always()
        run: docker compose -f docker-compose-native.yml down --volumes
