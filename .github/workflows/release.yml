name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version to prepare, for example 1.0.0. Leave empty to publish the selected tagged ref.
        required: false
        type: string
        default: ''
      skip_build:
        description: Skip the verification build before creating the release commit and tag
        type: boolean
        default: false
      auto_publish:
        description: Publish automatically after upload to Maven Central
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

jobs:
  maven-central:
    name: Maven Central
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      contents: write
      actions: write
    env:
      CENTRAL_AUTO_PUBLISH: ${{ github.event_name != 'workflow_dispatch' || inputs.auto_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Configure Git author
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare release version
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          SKIP_BUILD: ${{ inputs.skip_build }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_VERSION#v}"
          TAG="v$VERSION"

          if [[ -z "$VERSION" || "$VERSION" == *[[:space:]]* || "$VERSION" == */* ]]; then
            echo "::error::Invalid release version: $RELEASE_VERSION"
            exit 2
          fi

          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Refusing to prepare a snapshot release: $VERSION"
            exit 2
          fi

          if [[ "$GITHUB_REF_TYPE" != "branch" ]]; then
            echo "::error::Preparing a release requires running this workflow from a branch, not $GITHUB_REF_TYPE"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists locally"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on origin"
            exit 1
          fi

          CURRENT_VERSION="$(./mvnw -q -N -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)"
          echo "Preparing release $TAG from $CURRENT_VERSION"

          ./mvnw -B -ntp versions:set \
            -DnewVersion="$VERSION" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false

          export VERSION
          perl -0pi -e 's{(<artifactId>bootui-spring-boot-starter</artifactId>\s*<version>)[^<]*(</version>)}{$1$ENV{VERSION}$2}g' README.md docs/SETUP.md
          perl -0pi -e 's{(com\.julien-dubois\.bootui:bootui-spring-boot-starter:)[0-9][0-9A-Za-z.\-]*}{$1$ENV{VERSION}}g' docs/SETUP.md
          perl -0pi -e 's{(<artifactId>bootui-spring-boot-starter-reactive</artifactId>\s*<version>)[^<]*(</version>)}{$1$ENV{VERSION}$2}g' README.md docs/SETUP.md
          perl -0pi -e 's{(com\.julien-dubois\.bootui:bootui-spring-boot-starter-reactive:)[0-9][0-9A-Za-z.\-]*}{$1$ENV{VERSION}}g' docs/SETUP.md
          perl -0pi -e 's{(<artifactId>bootui-quarkus</artifactId>\s*<version>)[^<]*(</version>)}{$1$ENV{VERSION}$2}g' README.md docs/SETUP.md
          perl -0pi -e 's{(com\.julien-dubois\.bootui:bootui-quarkus:)[0-9][0-9A-Za-z.\-]*}{$1$ENV{VERSION}}g' docs/SETUP.md

          if ! grep -q "<version>$VERSION</version>" docs/SETUP.md; then
            echo "::error::Failed to update the bootui-spring-boot-starter version in docs/SETUP.md to $VERSION"
            exit 1
          fi

          if ! grep -q "com.julien-dubois.bootui:bootui-spring-boot-starter:$VERSION" docs/SETUP.md; then
            echo "::error::Failed to update the Gradle bootui-spring-boot-starter version in docs/SETUP.md to $VERSION"
            exit 1
          fi

          if ! grep -q "com.julien-dubois.bootui:bootui-spring-boot-starter-reactive:$VERSION" docs/SETUP.md; then
            echo "::error::Failed to update the Gradle bootui-spring-boot-starter-reactive version in docs/SETUP.md to $VERSION"
            exit 1
          fi

          if ! grep -q "com.julien-dubois.bootui:bootui-quarkus:$VERSION" docs/SETUP.md; then
            echo "::error::Failed to update the Gradle bootui-quarkus version in docs/SETUP.md to $VERSION"
            exit 1
          fi

          # Belt-and-braces: fail the release if any other declared dependency/plugin
          # version string still points at the previous release version anywhere in the
          # docs site or README, so a missed replacement can't silently ship stale docs.
          if grep -RnE "com\.julien-dubois\.bootui:[A-Za-z0-9_-]+:$CURRENT_VERSION" README.md docs/; then
            echo "::error::Found leftover references to the previous version ($CURRENT_VERSION) in docs/README after bumping to $VERSION"
            exit 1
          fi

          for npm_dir in . bootui-ui/src/main/frontend bootui-spring-sample-app/e2e bootui-quarkus-sample-app/e2e; do
            ( cd "$npm_dir" && npm version "$VERSION" --no-git-tag-version --allow-same-version --ignore-scripts >/dev/null )
            if ! grep -q "\"version\": \"$VERSION\"" "$npm_dir/package.json"; then
              echo "::error::Failed to update the npm package version in $npm_dir/package.json to $VERSION"
              exit 1
            fi
          done

          if [[ "$SKIP_BUILD" != "true" ]]; then
            # No -Dgpg.passphrase here: that user property is deprecated by maven-gpg-plugin
            # ("may leak sensitive information"). The plugin already reads the passphrase from
            # the MAVEN_GPG_PASSPHRASE env var above (its passphraseEnvName default) instead.
            ./mvnw -B -ntp -Prelease clean verify
          fi

          echo "Prepared release $TAG (version $VERSION) in the working tree; deferring the commit, tag, and push until the artifacts are verified on Maven Central."

          echo "PREPARED_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Verify release version
        run: |
          set -euo pipefail

          VERSION="$(./mvnw -q -N -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)"
          EXPECTED_TAG="v$VERSION"

          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Refusing to release snapshot version $VERSION"
            exit 1
          fi

          if [[ -n "${PREPARED_TAG:-}" && "$PREPARED_TAG" != "$EXPECTED_TAG" ]]; then
            echo "::error::Prepared tag $PREPARED_TAG does not match project version $VERSION"
            exit 1
          fi

          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match project version $VERSION"
            exit 1
          fi

          if [[ "$GITHUB_REF_TYPE" != "tag" && -z "${PREPARED_TAG:-}" ]]; then
            EXACT_TAG="$(git tag --points-at HEAD | grep -Fx "$EXPECTED_TAG" || true)"
            if [[ -z "$EXACT_TAG" ]]; then
              echo "::error::Manual publishing from a branch requires preparing a version or selecting a ref tagged $EXPECTED_TAG"
              exit 1
            fi
          fi

          for npm_dir in . bootui-ui/src/main/frontend bootui-spring-sample-app/e2e bootui-quarkus-sample-app/e2e; do
            node -e '
              const fs = require("fs");
              const [dir, expected] = process.argv.slice(1);
              const pkg = JSON.parse(fs.readFileSync(dir + "/package.json", "utf8"));
              const lock = JSON.parse(fs.readFileSync(dir + "/package-lock.json", "utf8"));
              const found = [pkg.version, lock.version, lock.packages?.[""]?.version];
              for (const v of found) {
                if (v !== expected) {
                  console.error(`::error::npm version mismatch in ${dir}: expected ${expected}, found ${v}`);
                  process.exit(1);
                }
              }
            ' "$npm_dir" "$VERSION"
          done

          echo "Releasing version $VERSION"

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          # No -Dgpg.passphrase here: that user property is deprecated by maven-gpg-plugin
          # ("may leak sensitive information"). The plugin already reads the passphrase from
          # the MAVEN_GPG_PASSPHRASE env var above (its passphraseEnvName default) instead.
          ./mvnw -B -ntp -Prelease clean deploy \
            -Dcentral.autoPublish="${CENTRAL_AUTO_PUBLISH}"

      - name: Wait for Maven Central availability
        if: env.CENTRAL_AUTO_PUBLISH == 'true'
        run: |
          set -euo pipefail

          VERSION="$(./mvnw -q -N -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)"
          BASE="https://repo1.maven.org/maven2/com/julien-dubois/bootui"

          # The artifacts a consumer needs to resolve the starter: the parent POM and every
          # published module JAR (the bootui-ui JAR carries the bundled Vue UI resources).
          ARTIFACTS=(
            "bootui-parent/${VERSION}/bootui-parent-${VERSION}.pom"
            "bootui-core/${VERSION}/bootui-core-${VERSION}.jar"
            "bootui-spring-autoconfigure/${VERSION}/bootui-spring-autoconfigure-${VERSION}.jar"
            "bootui-ui/${VERSION}/bootui-ui-${VERSION}.jar"
            "bootui-spring-boot-starter/${VERSION}/bootui-spring-boot-starter-${VERSION}.jar"
          )

          # Sonatype Central -> Maven Central propagation can lag behind a successful
          # autoPublish, so poll until every file is downloadable (or time out).
          DEADLINE=$(( SECONDS + 45 * 60 ))
          for artifact in "${ARTIFACTS[@]}"; do
            url="${BASE}/${artifact}"
            echo "Waiting for ${url}"
            until curl -fsI "$url" >/dev/null 2>&1; do
              if (( SECONDS > DEADLINE )); then
                echo "::error::Timed out waiting for ${url} to become available on Maven Central"
                exit 1
              fi
              sleep 20
            done
            echo "Available: ${artifact}"
          done

          echo "All BootUI ${VERSION} artifacts are available on Maven Central."

      - name: Smoke test published artifacts
        if: env.CENTRAL_AUTO_PUBLISH == 'true'
        run: |
          set -euo pipefail

          VERSION="$(./mvnw -q -N -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)"
          echo "Smoke-testing BootUI ${VERSION} by running the sample app against the published artifacts."

          # Drop the locally built/installed BootUI artifacts so the sample app is forced to
          # resolve them from Maven Central, exercising exactly what consumers download.
          rm -rf "$HOME/.m2/repository/com/julien-dubois/bootui"

          LOG="$(mktemp)"
          # No -am (do not rebuild the reactor modules) and no -o (must download from Central).
          # fork=false keeps the app in the Maven JVM so killing this PID stops it cleanly.
          ./mvnw -ntp -pl bootui-spring-sample-app -Dmaven.test.skip=true \
            -Dspring-boot.run.fork=false \
            spring-boot:run -Dspring-boot.run.profiles=dev > "$LOG" 2>&1 &
          APP_PID=$!
          cleanup() { kill "$APP_PID" 2>/dev/null || true; wait "$APP_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          BASE_URL="http://localhost:8080/bootui/"
          body=""
          ready=""
          DEADLINE=$(( SECONDS + 300 ))
          while (( SECONDS <= DEADLINE )); do
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "::error::The sample app exited before BootUI became available."
              cat "$LOG"
              exit 1
            fi
            body="$(curl -fsSL -H 'X-Forwarded-For: 127.0.0.1' "$BASE_URL" 2>/dev/null || true)"
            if printf '%s' "$body" | grep -q 'id="app"'; then
              ready=1
              break
            fi
            sleep 5
          done

          if [[ -z "$ready" ]]; then
            echo "::error::BootUI did not serve its UI at ${BASE_URL} within the timeout."
            cat "$LOG"
            exit 1
          fi

          if ! printf '%s' "$body" | grep -q '<title>BootUI</title>'; then
            echo "::error::BootUI index.html did not contain the expected <title>BootUI</title> marker."
            printf '%s\n' "$body"
            exit 1
          fi

          asset="$(printf '%s' "$body" | grep -oE 'assets/[A-Za-z0-9._-]+\.js' | head -n 1)"
          if [[ -z "$asset" ]]; then
            echo "::error::Could not find a bundled UI asset reference in BootUI index.html."
            printf '%s\n' "$body"
            exit 1
          fi

          echo "Verifying the bundled UI asset ${asset} is served."
          curl -fsSL -o /dev/null -H 'X-Forwarded-For: 127.0.0.1' "http://localhost:8080/bootui/${asset}"

          echo "BootUI ${VERSION} served its UI from the Maven Central artifacts successfully."

      - name: Commit, tag, and push release
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          set -euo pipefail

          TAG="${PREPARED_TAG:?PREPARED_TAG was not set by the prepare step}"
          VERSION="${TAG#v}"

          # Fail fast if versions:set (run with -DprocessAllModules=true, so it walks every
          # pom.xml in the tree regardless of nesting depth) missed a module: a stale nested
          # pom (e.g. under bootui-quarkus-integration-tests/*/pom.xml) would otherwise slip
          # through a shallow */pom.xml glob undetected.
          stale_poms="$(git ls-files '*pom.xml' | xargs -I{} sh -c "grep -q '<version>$VERSION</version>' '{}' || echo '{}'")"
          if [[ -n "$stale_poms" ]]; then
            echo "::error::The following poms were not bumped to $VERSION:"
            echo "$stale_poms"
            exit 1
          fi

          if [[ -n "$(git status --porcelain)" ]]; then
            # Stage every tracked file the version bump touched, at any depth, instead of an
            # explicit path list: an explicit shallow glob (e.g. */pom.xml) silently misses
            # nested poms that versions:set still updates in the working tree.
            git add -u
            git commit -m "Release $TAG"
          else
            echo "Project files already declare the released version; tagging current HEAD."
          fi

          # The Maven Central publish + availability wait + smoke test steps above can take
          # tens of minutes - long enough for another PR to merge into $GITHUB_REF_NAME while
          # this job runs, which would otherwise reject this push as a non-fast-forward. Retry
          # by rebasing onto the latest remote tip instead of failing outright: the release
          # commit only touches version-specific files (pom.xml, README.md, docs/SETUP.md,
          # package.json/-lock.json), so an unrelated concurrent merge is expected to rebase
          # cleanly. A genuine conflict (e.g. a second release racing this one) still fails loudly.
          attempt=1
          max_attempts=5
          while ! git push origin "HEAD:$GITHUB_REF_NAME"; do
            if (( attempt >= max_attempts )); then
              echo "::error::Failed to push the release commit to $GITHUB_REF_NAME after $max_attempts attempts (another merge kept landing on $GITHUB_REF_NAME)."
              exit 1
            fi
            attempt=$((attempt + 1))
            echo "Push rejected: $GITHUB_REF_NAME advanced during the release. Rebasing onto the latest origin/$GITHUB_REF_NAME and retrying (attempt $attempt/$max_attempts)."
            sleep 5
            git fetch origin "$GITHUB_REF_NAME"
            if ! git rebase FETCH_HEAD; then
              git rebase --abort
              echo "::error::Rebasing the release commit onto origin/$GITHUB_REF_NAME hit a conflict; resolve manually and re-run the release."
              exit 1
            fi
          done

          # Tag after the push succeeds so the tag points at the commit that actually landed on
          # $GITHUB_REF_NAME (a rebase above would have changed the release commit's SHA).
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Redeploy documentation site
        if: env.CENTRAL_AUTO_PUBLISH == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The release commit is pushed to main with GITHUB_TOKEN, which does not
          # trigger the Pages workflow. Dispatch it explicitly so the docs site
          # rebuilds with the released version's setup instructions - only now that the
          # artifacts are live on Maven Central and the smoke test has passed.
          gh workflow run pages.yml --ref main

      - name: Manual publish reminder
        if: env.CENTRAL_AUTO_PUBLISH != 'true'
        run: |
          cat <<'EOF'
          Auto-publish was disabled, so the deployment was uploaded to the Sonatype Central
          Portal but the artifacts are NOT yet public on Maven Central.

          To keep the documented version in lockstep with what is downloadable, this run skipped
          the Maven Central availability wait, the published-artifact smoke test, and the
          documentation-site redeploy.

          Finish the release by publishing the deployment in the Central Portal, then run the
          "pages.yml" workflow (from the Actions tab) so the documentation site advertises the
          new version.
          EOF
