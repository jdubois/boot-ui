spring.application.name=bootui-sample
server.port=8080
spring.threads.virtual.enabled=true

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:0.5b
spring.ai.ollama.init.pull-model-strategy=when_missing
spring.ai.ollama.init.chat.additional-models=qwen2.5:0.5b
spring.ai.chat.client.observations.log-prompt=false
spring.ai.chat.client.observations.log-completion=false

# Recreate the sample schema on startup, but do not drop shared Docker Compose tables when auxiliary e2e apps stop.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Flyway manages the "catalog" tables (db/migration); Liquibase manages the separate "inventory" tables.
# The sample app applies only the base migration state on startup, leaving two Flyway migrations and two Liquibase
# change sets pending so the BootUI actions can be exercised manually.
spring.flyway.enabled=true
# The sample app shares one schema between Hibernate (ddl-auto), Liquibase and Flyway,
# so let Flyway baseline an already-populated schema (at version 0) instead of failing,
# while still applying the catalog base migrations V1/V2.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

spring.data.redis.repositories.enabled=false
spring.cache.type=redis
spring.cache.cache-names=sample-products,sample-greetings
spring.cache.redis.time-to-live=10m

# Enable the "Fix it with Copilot" capability so the panel is demoable out of the box.
# Runs still require the GitHub Copilot SDK on the classpath and a GitHub token to be available.
bootui.copilot-fix.enabled=ON

sample.greeting=Hello
sample.retries=3

logging.level.io.github.jdubois.bootui=DEBUG
