services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: bootui_sample
      POSTGRES_USER: bootui
      POSTGRES_PASSWORD: bootui
    ports:
      - "5432"
  redis:
    image: redis:8-alpine
    ports:
      - "6379"
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${BOOTUI_OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: [ "CMD", "ollama", "--version" ]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      org.springframework.boot.service-connection: ollama
