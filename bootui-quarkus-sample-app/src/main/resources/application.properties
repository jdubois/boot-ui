# =============================================================================
# BootUI Quarkus sample app — configuration
#
# Phase-1 scaffold (docs/QUARKUS-SUPPORT.md §8). This file mirrors the intent of the Spring
# sample's application*.properties: wire up each ingredient so a BootUI panel has data to show.
# The `bootui-quarkus` extension is what actually serves the /bootui console in dev mode.
# =============================================================================

quarkus.application.name=bootui-quarkus-sample
# 8082, not 8080, so this can run alongside the Spring servlet sample app (bootui-spring-sample-app,
# 8080) and the WebFlux sample app (bootui-spring-webflux-sample-app, 8081) at the same time without a
# port clash. The Docker image (Dockerfile-quarkus) keeps this same 8082 via an explicit
# QUARKUS_HTTP_PORT environment variable, so the port is identical locally and in Docker.
quarkus.http.port=8082

# --- Datasource -------------------------------------------------------------
# In dev/test, Quarkus Dev Services automatically starts a throwaway PostgreSQL container (requires
# Docker/Podman). This is the headline of the Quarkus "Dev Services" panel. No URL is configured on
# purpose so Dev Services takes over; set quarkus.datasource.jdbc.url to point at a real database.
quarkus.datasource.db-kind=postgresql

# --- Hibernate ORM ----------------------------------------------------------
# Hibernate manages the entity tables (sample_products, sample_advisor_*). Flyway and Liquibase manage
# their own, separate tables, so there is no overlap. drop-and-create keeps the sample deterministic.
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Log SQL so the SQL Trace / Database panels have statements to surface.
quarkus.hibernate-orm.log.sql=true

# --- Flyway (catalog_* tables) ---------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# --- Liquibase (inventory_* tables) ----------------------------------------
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# --- Security ---------------------------------------------------------------
# This is the Quarkus analogue of the Spring sample's SecurityConfiguration. The intent mirrors Spring:
# protected admin/secure endpoints, named roles, HTTP Basic login, real authorization, and a couple of
# deliberately flaggable settings so the Quarkus Security advisor (docs/QUARKUS-CHECKS.md) shows a
# meaningful mix of PASS and finding results — not an all-green or all-red panel.

# Simple file-based (embedded) users for the demo: developer/developer (role user) and admin/admin
# (role admin). Plain text is fine for a local demo; never do this in production.
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.developer=developer
quarkus.security.users.embedded.roles.developer=user
quarkus.security.users.embedded.users.admin=admin
quarkus.security.users.embedded.roles.admin=admin

# Enable HTTP Basic authentication explicitly (the analogue of Spring's httpBasic()). Because the demo
# also serves cleartext HTTP (insecure-requests=enabled, the Quarkus default), the Security advisor
# correctly flags QS-AUTH-002 (HIGH, basic auth without TLS) — a realistic local-dev finding.
quarkus.http.auth.basic=true

# Path-based authorization (the analogue of Spring's securityMatcher(...).hasRole("ADMIN")). These run
# alongside the @RolesAllowed("admin") annotations on AdminResource/SecureResource and give the advisor
# real quarkus.http.auth.permission.* policies to read so QS-AUTHZ-001 does not fire.
quarkus.http.auth.permission.admin.paths=/admin,/admin/*
quarkus.http.auth.permission.admin.policy=admin-role
quarkus.http.auth.permission.secure.paths=/api/secure,/api/secure/*
quarkus.http.auth.permission.secure.policy=admin-role
quarkus.http.auth.policy.admin-role.roles-allowed=admin

# Security response headers (HSTS + a baseline CSP, plus clickjacking/MIME-sniffing guards). Configuring
# these makes QS-HDR-001/002/003/004 all PASS — the "good practice" side of the advisor mix. HSTS uses a
# one-year max-age with includeSubDomains, and the framing/sniffing headers cover QS-HDR-003.
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains
quarkus.http.header."Content-Security-Policy".value=default-src 'self'
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."X-Content-Type-Options".value=nosniff

# --- Intentional CRITICAL security finding (demo only) ----------------------
# DELIBERATELY INSECURE: this is the Quarkus counterpart to the Spring sample's intentional
# NoOpPasswordEncoder bean — it exists purely so the Security panel surfaces a real CRITICAL finding.
# Enabling CORS with a wildcard origin AND allow-credentials=true (QS-CORS-002, CRITICAL) lets any
# website make credentialed cross-origin calls. NEVER ship this combination in a real application; pin
# explicit origins and only allow credentials for those.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=*
quarkus.http.cors.access-control-allow-credentials=true

# Fire CDI security events so SampleSecurityEvents feeds the Security Logs panel.
quarkus.security.events.enabled=true

# --- Metrics ----------------------------------------------------------------
quarkus.micrometer.export.prometheus.enabled=true

# --- Tracing (OpenTelemetry) ------------------------------------------------
# The bootui-quarkus extension is expected to register an in-process span exporter for the Traces
# panel (analogous to the Spring side). Until then keep traces enabled but do not push to an external
# collector, so the app starts cleanly without one running.
quarkus.otel.traces.enabled=true
quarkus.otel.traces.exporter=none

# --- AI (LangChain4j + Ollama) ----------------------------------------------
# Points at a local Ollama. ChatResource returns a clear "AI unavailable" 503 when it is unreachable,
# so the app is fully usable without Ollama running.
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-id=llama3
quarkus.langchain4j.ollama.timeout=30s

# --- Sample app settings ----------------------------------------------------
sample.greeting=Hello
sample.retries=3

# --- Profile-specific override (Profile Diff panel) -------------------------
# Quarkus has no separate application-dev.properties file; %profile.-prefixed keys serve the
# same purpose in one file. This dev-only override (fail fast with fewer retries while
# iterating locally) gives the Profile Diff panel a real, non-default property to display for
# the active "dev" profile, mirroring how the Spring sample app's application-dev.properties
# gives its own Profile Diff spec real content. It must stay a key already declared on
# SampleSettings (sample.retries) -- SmallRye Config's strict mapping validation rejects any
# %dev.sample.* key that isn't a known field of the registered "sample" @ConfigMapping root.
%dev.sample.retries=1

# --- Logging ----------------------------------------------------------------
quarkus.log.category."io.github.jdubois.bootui".level=DEBUG

# --- BootUI (consumed by the bootui-quarkus extension) ----------------------
# The extension is dev-mode-only and activates automatically under `quarkus:dev`. These keys mirror
# the Spring starter's safety knobs and are listed here for reference; uncomment as the extension
# grows support for them.
# bootui.allowed-hosts=
# bootui.allow-non-localhost=false
# bootui.vulnerabilities.osv-enabled=true
