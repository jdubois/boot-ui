spring.application.name=bootui-sample
server.port=8080
spring.threads.virtual.enabled=true

# Run Docker-free by default. The "dev" profile (application-dev.properties) is the default
# (spring.profiles.default=dev), so a bare `spring-boot:run`, the "try me" scripts, and the
# Playwright e2e suite all start without Docker. Activate the "docker" profile for the full
# Docker experience (PostgreSQL, Redis, Ollama): -Dspring-boot.run.profiles=docker
spring.profiles.default=dev

# Keep the base configuration Docker-free: do not start Docker Compose (compose.yaml) even though
# spring-boot-docker-compose is on the classpath. Only the "docker" profile turns this back on
# (application-docker.properties), so no profile other than "docker" can ever start the containers.
spring.docker.compose.enabled=false

# Keep BootUI active under both sample profiles (dev = Docker-free, docker = full Docker), so its
# activation reason is the profile rather than spring-boot-devtools.
bootui.enabled-profiles=dev,local,docker

# Recreate the sample schema on startup, but do not drop shared Docker Compose tables when auxiliary e2e apps stop.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Flyway manages the "catalog" tables (db/migration); Liquibase manages the separate "inventory" tables.
# The sample app applies only the base migration state on startup, leaving two Flyway migrations and two Liquibase
# change sets pending so the BootUI actions can be exercised manually.
spring.flyway.enabled=true
# The sample app shares one schema between Hibernate (ddl-auto), Liquibase and Flyway,
# so let Flyway baseline an already-populated schema (at version 0) instead of failing,
# while still applying the catalog base migrations V1/V2.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Cache names shared by both profiles (a simple in-memory cache under "dev", Redis under "docker").
spring.cache.cache-names=sample-products,sample-greetings

# Mail: a JavaMailSender is configured so the BootUI Email panel is available and can demonstrate
# captured outgoing mail. The Email panel runs in dev-trap mode (bootui.email.dev-trap=true), so the
# sample emails are captured for display but never actually handed to a real SMTP transport - no mail
# server is required and the sample app never sends real email. The host/port below are therefore
# never contacted; they only exist so Spring Boot auto-configures the JavaMailSender bean.
spring.mail.host=localhost
spring.mail.port=1025
bootui.email.dev-trap=true
# Because dev-trap never opens an SMTP connection, disable the Actuator mail health probe so it does not
# report DOWN for the intentionally-unreachable localhost:1025. (Real apps with a live mail server keep
# the default: BootUI's capture wrapper stays a JavaMailSenderImpl, so the mail health indicator works.)
management.health.mail.enabled=false


sample.greeting=Hello
sample.retries=3
# Base URL of the companion BootUI Quarkus sample app (bootui-quarkus-sample-app), used by the
# "cross-service" sample action to demonstrate a real Spring -> Quarkus HTTP call whose trace shows
# up as one merged waterfall in this app's BootUI Traces panel (see the Quarkus app's
# quarkus.otel.exporter.otlp.endpoint, which points back at this app's OTLP receiver).
sample.quarkus-base-url=http://localhost:8082

logging.level.io.github.jdubois.bootui=DEBUG
