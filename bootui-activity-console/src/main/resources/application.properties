# BootUI Activity Console: a standalone Spring WebFlux application that aggregates Live Activity
# entries forwarded over HTTP from any BootUI-enabled instance on localhost. See
# io.github.jdubois.bootui.console.BootUiActivityConsoleApplication for the full module description.

spring.application.name=bootui-activity-console

# Distinct from BootUI's own default panel-embedded ports (host apps typically run on 8080) so the
# console can run alongside a demo Spring Boot and/or Quarkus sample app without a port clash.
server.port=8079

# Zero-config default: an in-memory H2 database dedicated to this console instance. Point
# spring.r2dbc.url (and, if needed, spring.r2dbc.username/password) at a file-based H2 URL or another
# R2DBC driver on the classpath (e.g. Postgres) for activity history that survives a restart.
spring.r2dbc.url=r2dbc:h2:mem:///bootui-console?options=DB_CLOSE_DELAY=-1

# See io.github.jdubois.bootui.console.activity.ConsoleActivityProperties. bootui.console.activity.shared-secret
# is unset (off) by default; set it to require senders to present it via the X-BootUI-Forward-Token header.
bootui.console.activity.table-name=bootui_console_activity
