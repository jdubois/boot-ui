# Random test port to avoid parallel-build collisions — see
# bootui-quarkus-integration-tests/base/src/test/resources/application.properties for why.
quarkus.http.test-port=0

# Keep the OpenTelemetry SDK active (so the BootUI in-process SpanProcessor receives spans) but export
# nowhere: this is an in-process capture test, not an OTLP-export test, so no collector/network is needed.
quarkus.otel.traces.exporter=none
# Sample every span so the emitted GenAI span is always delivered to the BootUI SpanProcessor.
quarkus.otel.traces.sampler=always_on
quarkus.application.name=bootui-quarkus-otel-it

# In-memory H2 datasource: lets a test endpoint run real JDBC on a worker thread so the Live Activity
# correlation test can prove the OpenTelemetry trace id propagates across the event-loop→worker hop. No
# Docker, no network. DB_CLOSE_DELAY=-1 keeps the in-memory DB alive for the JVM lifetime.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:bootui-otel-it;DB_CLOSE_DELAY=-1
quarkus.datasource.jdbc.min-size=0
