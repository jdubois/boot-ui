quarkus.application.name=bootui-quarkus-flyway-it
# In-memory H2 datasource for Flyway to manage; keeps the @QuarkusTest Docker-free.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:flyway-it;DB_CLOSE_DELAY=-1
# Run the bundled db/migration scripts at startup so the panel has applied migration history to report.
quarkus.flyway.migrate-at-start=true
