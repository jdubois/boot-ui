quarkus.application.name=bootui-quarkus-datasource-it
# An in-memory H2 datasource backed by Agroal. Enabling JDBC metrics lets the QuarkusAgroalConnectionPoolProvider
# read the live AgroalDataSourceMetrics (active/available/awaiting counts) and map them into the snapshot; without
# this flag the panel still renders the pool configuration but marks the pool unavailable (metrics disabled).
quarkus.datasource.db-kind=h2
quarkus.datasource.username=bootui_app
quarkus.datasource.password=examplepass
quarkus.datasource.jdbc.url=jdbc:h2:mem:bootui;DB_CLOSE_DELAY=-1
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.metrics.enabled=true
