quarkus.application.name=bootui-quarkus-liquibase-it

# In-memory H2 datasource, so the @QuarkusTest boots without Docker.
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:bootui-liquibase-it;DB_CLOSE_DELAY=-1

# Run Liquibase at startup so the change-log history table is populated before any panel read.
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml
