quarkus.application.name=bootui-quarkus-email-it
# The mailer runs in mock mode by default under LaunchMode.TEST, so no SMTP server (and no Docker) is needed;
# the SentMail CDI event the QuarkusEmailCapture observer records still fires in mock mode. A default "from"
# address is required for Mail.withText(...) sends that do not set one explicitly.
quarkus.mailer.from=bootui-it@example.com
